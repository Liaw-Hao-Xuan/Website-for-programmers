<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale = 1.0">
    <title>Settings</title>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html"><img src="assets/testimage.png" alt="Logo" width="56" height="41"></a>
        </div>

        <div class="navitems">
            <a href="services.html" class="services">Services</a>
            <a href="about.html" class="about">About</a>
            <a href="settings.html" class="settings">Settings</a>
            <a href="help.html" class="help">Help</a>
        </div>

        <div class="search-wrapper">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12A6 6 0 0110 4z"/>
              </svg>
            </span>
            <input type="text" placeholder="Search...">
          </div>
    </nav>


    <main class="setting">
        <div class="section">
            <h2>Appearance</h2>
            <p>Select your preferred theme:</p>
            <div class="modes">
                <button class="light">Light Mode</button>
                <button class="dark">Dark Mode</button>
            </div>
        </div>

        <div class="section">
            <h2>User Preferences</h2>

            <div>
                <h3>Language</h3>
                <button>Change Language</button>
            </div>
        </div>

        <div class="section">
            <h2>Account Settings</h2>

            <div>
                <h3>Profile Information</h3>
                <form>
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name"><br><br>

                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email"><br><br>

                    <button type="submit">Save Changes</button>
                </form>
            </div>

            <div>
                <h3>Password</h3>
                <form>
                    <label for="current-password">Current Password:</label><br>
                    <input type="password" id="current-password"><br><br>

                    <label for="new-password">New Password:</label><br>
                    <input type="password" id="new-password"><br><br>

                    <button type="submit">Update Password</button>
                </form>
            </div>
        </div>

        <div class="section">
            <h2>Notifications</h2>

            <div>
                <input type="checkbox" id="email-notifications">
                <label for="email-notifications">Email Notifications</label>
            </div>

            <div>
                <input type="checkbox" id="sms-notifications">
                <label for="sms-notifications">SMS Notifications</label>
            </div>

            <div>
                <input type="checkbox" id="push-notifications">
                <label for="push-notifications">Push Notifications</label>
            </div>
        </div>

        <div class="section">
            <h2>Privacy Settings</h2>

            <div>
                <input type="checkbox" id="profile-visibility">
                <label for="profile-visibility">Make profile public</label>
            </div>

            <div>
                <input type="checkbox" id="data-sharing">
                <label for="data-sharing">Allow data sharing for analytics</label>
            </div>
        </div>

        <div class="section">
            <h2>Danger Zone</h2>

            <div>
                <button>Deactivate Account</button>
            </div>

            <div>
                <button>Delete Account</button>
            </div>
        </div>

    </main>

    <footer>
        <nav>
            <a href="#">Privacy Policy</a> |
            <a href="#">Terms of Service</a>
        </nav>
    </footer>

</body>
</html>
