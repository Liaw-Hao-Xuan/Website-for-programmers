<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Preview</title>

    <link rel="stylesheet" href="live.css">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            <a href="index.html">
                <img src="assets/testimage.png" alt="Logo" width="56" height="41">
            </a>
        </div>

        <div class="navitems">
            <a href="services.html" class="services">Services</a>
            <a href="about.html" class="about">About</a>
            <a href="settings.html" class="settings">Settings</a>
            <a href="help.html" class="help">Help</a>
        </div>

        <div class="search-wrapper">

            <span class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12A6 6 0 0110 4z"/>
                </svg>
            </span>

            <input type="text" placeholder="Search...">

        </div>

    </nav>

    <div class="main-layout">

        <main id="websitePreview">

            <section class="default-preview">
                <h1>Live Website Preview</h1>
                <p>Your code output will appear here.</p>
            </section>

        </main>

    </div>

    <div class="floating-code-container" id="floatingContainer">

        <div class="floating-header" id="dragHeader">

            <div class="editor-tabs">

                <button class="editor-tab active" data-tab="htmlPanel">
                    HTML
                </button>

                <button class="editor-tab" data-tab="cssPanel">
                    CSS
                </button>

                <button class="editor-tab" data-tab="jsPanel">
                    JS
                </button>

            </div>

        </div>


        <div class="editor-scroll-area">

            <div id="htmlPanel" class="floating-code-panel active">

<textarea id="floatingHtml"><section class="hero">
    <h1>Hello World</h1>
    <p>Add anything here</p>
</section></textarea>

            </div>
            <div id="cssPanel" class="floating-code-panel">

<textarea id="floatingCss">body{
    margin:0;
    font-family:Arial, sans-serif;
}

.hero{
    padding:60px;
    text-align:center;
    background:#f4f4f4;
}

h1{
    color:darkred;
}</textarea>

            </div>
            <div id="jsPanel" class="floating-code-panel">

<textarea id="floatingJs">console.log("Live Preview Running");</textarea>

            </div>

        </div>
        <button class="run-button" id="runFloating">
            Run Code ▶
        </button>

    </div>
    <script>
        const runFloating = document.getElementById("runFloating");

        const floatingHtml =
            document.getElementById("floatingHtml");

        const floatingCss =
            document.getElementById("floatingCss");

        const floatingJs =
            document.getElementById("floatingJs");

        const websitePreview =
            document.getElementById("websitePreview");
        function runCode() {

            const html = floatingHtml.value;

            const css = `
                <style>
                    ${floatingCss.value}
                </style>
            `;

            const js = `
                <script>
                    ${floatingJs.value}
                <\/script>
            `;

            websitePreview.innerHTML = html + css + js;

        }

        runFloating.addEventListener("click", runCode);

        const tabs =
            document.querySelectorAll(".editor-tab");

        const panels =
            document.querySelectorAll(".floating-code-panel");


        tabs.forEach(tab => {

            tab.addEventListener("click", () => {

                tabs.forEach(t => {
                    t.classList.remove("active");
                });

                panels.forEach(panel => {
                    panel.classList.remove("active");
                });

                tab.classList.add("active");

                const panelId = tab.dataset.tab;

                document
                    .getElementById(panelId)
                    .classList.add("active");

            });

        });

        const floatingContainer =
            document.getElementById("floatingContainer");

        const dragHeader =
            document.getElementById("dragHeader");

        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;


        dragHeader.addEventListener("mousedown", (e) => {

            isDragging = true;

            offsetX =
                e.clientX - floatingContainer.offsetLeft;

            offsetY =
                e.clientY - floatingContainer.offsetTop;

            dragHeader.style.cursor = "grabbing";

        });


        document.addEventListener("mousemove", (e) => {

            if (isDragging) {

                let newX = e.clientX - offsetX;
                let newY = e.clientY - offsetY;

                const maxX =
                    window.innerWidth -
                    floatingContainer.offsetWidth;

                const maxY =
                    window.innerHeight -
                    floatingContainer.offsetHeight;

                if (newX < 0) newX = 0;
                if (newY < 80) newY = 80;

                if (newX > maxX) newX = maxX;
                if (newY > maxY) newY = maxY;

                floatingContainer.style.left =
                    newX + "px";

                floatingContainer.style.top =
                    newY + "px";

            }

        });


        document.addEventListener("mouseup", () => {

            isDragging = false;

            dragHeader.style.cursor = "move";

        });

        runCode();

    </script>

</body>
</html>
