<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Preview</title>
    <link rel="stylesheet" href="live.css">
    
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DV0MCQ08GH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-DV0MCQ08GH');
</script>
<body>

    <nav class="navbar">

        <div class="logo">
            <a href="index.html">
                <img src="assets/testimage.png" alt="Logo" width="56" height="41">
            </a>
        </div>

        <div class="navitems">
            <a href="services.html" class="services">Services</a>
            <a href="about.html" class="about">About</a>
            <a href="settings.html" class="settings">Settings</a>
            <a href="help.html" class="help">Help</a>
        </div>

        <div class="search-wrapper">

            <span class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12A6 6 0 0110 4z"/>
                </svg>
            </span>

            <input type="text" placeholder="Search...">

        </div>

    </nav>

    <div class="main-layout">

        <main id="websitePreview">

            <section class="default-preview">
                <h1>Live Website Preview</h1>
                <p>Your code output will appear here.</p>
            </section>

        </main>

    </div>

    <div class="floating-code-container" id="floatingContainer">

        <div class="floating-header" id="dragHeader">

            <div class="editor-tabs">

                <button class="editor-tab active" data-tab="htmlPanel">
                    HTML
                </button>

                <button class="editor-tab" data-tab="cssPanel">
                    CSS
                </button>

                <button class="editor-tab" data-tab="jsPanel">
                    JS
                </button>

            </div>

        </div>


        <div class="editor-scroll-area">

            <div id="htmlPanel" class="floating-code-panel active">

<textarea id="floatingHtml"><section class="hero">
    <h1>Hello World</h1>
    <p>Add anything here</p>
</section></textarea>

            </div>
            <div id="cssPanel" class="floating-code-panel">

<textarea id="floatingCss">body{
    margin:0;
    font-family:Arial, sans-serif;
}

.hero{
    padding:60px;
    text-align:center;
    background:#f4f4f4;
}

h1{
    color:darkred;
}</textarea>

            </div>
            <div id="jsPanel" class="floating-code-panel">

<textarea id="floatingJs">console.log("Live Preview Running");</textarea>

            </div>

        </div>
        <button class="run-button" id="runFloating">
            Run Code ▶
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
